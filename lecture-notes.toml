[providers.openai]
type = "openai"
api_key_env = "OPENAI_API_KEY"

[providers.local]
type = "compatible"
base_url = "http://localhost:1234/v1"
api_key_env = "LECTURE_NOTES_API_KEY"

[stages.correction]
provider = "openai"
model = "gpt-5.4-mini"
max_output_tokens = 20000

[stages.correction.request.reasoning]
effort = "medium"

[stages.formatting]
provider = "openai"
model = "gpt-5.4-mini"
max_output_tokens = 20000

[stages.formatting.request.reasoning]
effort = "low"

[stages.summary]
provider = "openai"
model = "gpt-5.4"
max_output_tokens = 8000
service_tier = "flex"

[stages.summary.request.reasoning]
effort = "medium"

[stages.cornell]
provider = "openai"
model = "gpt-5.4"
max_output_tokens = 12000
