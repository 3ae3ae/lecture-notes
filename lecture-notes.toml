[providers.openai]
type = "openai"
api_key_env = "OPENAI_API_KEY"

[providers.local]
type = "compatible"
base_url = "http://localhost:1234/v1"
api_key_env = "LECTURE_NOTES_API_KEY"

[stages.correction]
provider = "openai"
model = "gpt-5.4-mini"
temperature = 0.1
reasoning_effort = "medium"
max_completion_tokens = 20000

[stages.formatting]
provider = "openai"
model = "gpt-5.4-mini"
temperature = 0.1
reasoning_effort = "minimal"
max_completion_tokens = 20000

[stages.summary]
provider = "openai"
model = "gpt-5.4"
temperature = 0.2
max_completion_tokens = 8000
service_tier = "flex"
reasoning_effort = "medium"

[stages.cornell]
provider = "openai"
model = "gpt-5.4"
temperature = 0.2
max_completion_tokens = 12000
